name: Android CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Lint + Unit Test + Debug Build
        shell: bash
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug --console plain

      - name: Upload debug APK (push only)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: habe-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
