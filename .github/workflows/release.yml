name: SmartDash Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3). Leave empty to auto-generate."
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.inputs.tag || 'auto' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: write
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
            if [[ -z "${TAG}" ]]; then
              TAG="v$(date +'%Y.%m.%d-%H%M')"
            fi
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          VERSION_NAME="$(sed -nE 's/^[[:space:]]*versionName = "([^"]+)"/\1/p' app/build.gradle.kts | head -n 1)"
          VERSION_CODE="$(sed -nE 's/^[[:space:]]*versionCode = ([0-9]+)/\1/p' app/build.gradle.kts | head -n 1)"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"
          echo "name=SmartDash by Shawn Rain ${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Clean Gradle cache
        shell: bash
        run: |
          rm -rf ~/.gradle/caches/build-cache-1
          rm -rf ~/.gradle/caches/transforms-*
          rm -rf .gradle/configuration-cache

      - name: Verify applicationId matches expected package
        shell: bash
        run: |
          EXPECTED_APP_ID="com.shawnrain.sdash"
          ACTUAL_APP_ID="$(grep -m1 'applicationId' app/build.gradle.kts | sed -n 's/.*"\([^"]*\)".*/\1/p')"
          if [[ "${ACTUAL_APP_ID}" != "${EXPECTED_APP_ID}" ]]; then
            echo "ERROR: applicationId mismatch. Expected '${EXPECTED_APP_ID}', got '${ACTUAL_APP_ID}'" >&2
            exit 1
          fi
          echo "applicationId verified: ${ACTUAL_APP_ID}"

      - name: Validate release signing secrets
        env:
          HABE_RELEASE_STORE_FILE_BASE64: ${{ secrets.HABE_RELEASE_STORE_FILE_BASE64 }}
          HABE_RELEASE_STORE_PASSWORD: ${{ secrets.HABE_RELEASE_STORE_PASSWORD }}
          HABE_RELEASE_KEY_ALIAS: ${{ secrets.HABE_RELEASE_KEY_ALIAS }}
          HABE_RELEASE_KEY_PASSWORD: ${{ secrets.HABE_RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          missing=0
          [[ -z "${HABE_RELEASE_STORE_FILE_BASE64}" ]] && echo "Missing required secret: HABE_RELEASE_STORE_FILE_BASE64" >&2 && missing=1
          [[ -z "${HABE_RELEASE_STORE_PASSWORD}" ]] && echo "Missing required secret: HABE_RELEASE_STORE_PASSWORD" >&2 && missing=1
          [[ -z "${HABE_RELEASE_KEY_ALIAS}" ]] && echo "Missing required secret: HABE_RELEASE_KEY_ALIAS" >&2 && missing=1
          [[ -z "${HABE_RELEASE_KEY_PASSWORD}" ]] && echo "Missing required secret: HABE_RELEASE_KEY_PASSWORD" >&2 && missing=1
          if [[ "${missing}" -ne 0 ]]; then
            echo "Release workflow requires complete signing secrets to produce signed artifacts." >&2
            exit 1
          fi

      - name: Prepare release signing
        id: signing
        shell: bash
        run: |
          STORE_FILE="${RUNNER_TEMP}/habe-release.jks"
          echo "${{ secrets.HABE_RELEASE_STORE_FILE_BASE64 }}" | base64 --decode > "${STORE_FILE}"
          echo "HABE_RELEASE_STORE_FILE=${STORE_FILE}" >> "${GITHUB_ENV}"
          echo "HABE_RELEASE_STORE_PASSWORD=${{ secrets.HABE_RELEASE_STORE_PASSWORD }}" >> "${GITHUB_ENV}"
          echo "HABE_RELEASE_KEY_ALIAS=${{ secrets.HABE_RELEASE_KEY_ALIAS }}" >> "${GITHUB_ENV}"
          echo "HABE_RELEASE_KEY_PASSWORD=${{ secrets.HABE_RELEASE_KEY_PASSWORD }}" >> "${GITHUB_ENV}"
          echo "signed=true" >> "${GITHUB_OUTPUT}"

      - name: Build release APK
        shell: bash
        run: |
          ./gradlew clean :app:assembleRelease --console plain

      - name: Verify APK applicationId
        shell: bash
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*-unsigned.apk' | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "No APK found" >&2
            exit 1
          fi
          # Extract applicationId from APK using aapt2 or unzip + dump
          if command -v aapt &>/dev/null; then
            APP_ID="$(aapt dump badging "${APK_PATH}" | grep -oP "package: name='\K[^']+")"
          else
            # Fallback: extract AndroidManifest.xml and check
            APP_ID="$(unzip -p "${APK_PATH}" AndroidManifest.xml 2>/dev/null | strings | grep -o 'com\.shawnrain\.[a-z]\+' | head -1)"
          fi
          if [[ -z "${APP_ID}" ]]; then
            echo "WARNING: Could not extract applicationId from APK, skipping verification" >&2
          elif [[ "${APP_ID}" != "com.shawnrain.sdash" ]]; then
            echo "ERROR: APK contains wrong applicationId: ${APP_ID} (expected com.shawnrain.sdash)" >&2
            exit 1
          fi
          echo "APK applicationId verified: ${APP_ID}"

      - name: Collect artifact path
        id: artifact
        shell: bash
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*-unsigned.apk' | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "No signed APK found under app/build/outputs/apk/release" >&2
            exit 1
          fi
          cp "${APK_PATH}" "smartdash-${{ steps.meta.outputs.tag }}-release.apk"
          SHA256="$(sha256sum "smartdash-${{ steps.meta.outputs.tag }}-release.apk" | awk '{print $1}')"
          printf '%s  %s\n' "${SHA256}" "smartdash-${{ steps.meta.outputs.tag }}-release.apk" > "smartdash-${{ steps.meta.outputs.tag }}-release.sha256"
          echo "apk=${APK_PATH}" >> "${GITHUB_OUTPUT}"
          echo "apk_copy=smartdash-${{ steps.meta.outputs.tag }}-release.apk" >> "${GITHUB_OUTPUT}"
          echo "sha_copy=smartdash-${{ steps.meta.outputs.tag }}-release.sha256" >> "${GITHUB_OUTPUT}"

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smartdash-${{ steps.meta.outputs.tag }}-signed
          path: |
            ${{ steps.artifact.outputs.apk_copy }}
            ${{ steps.artifact.outputs.sha_copy }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          make_latest: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            ${{ steps.artifact.outputs.apk_copy }}
            ${{ steps.artifact.outputs.sha_copy }}
          body: |
            Automated SmartDash Android release from GitHub Actions.

            Version: `${{ steps.meta.outputs.version_name }}`
            Build code: `${{ steps.meta.outputs.version_code }}`

            Signed APK: `${{ steps.signing.outputs.signed }}`
