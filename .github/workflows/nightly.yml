name: Android Nightly

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  nightly-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Lint + Unit Test + Debug Build
        shell: bash
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug --console plain

      - name: Upload nightly debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: habe-nightly-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
