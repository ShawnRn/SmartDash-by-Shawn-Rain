name: Verify Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to verify"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build smoke verification
        shell: bash
        run: |
          ./gradlew :app:assembleRelease --console plain

      - name: Verify APK output
        id: apk
        shell: bash
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*-unsigned.apk' | head -n 1)"
          test -n "${APK_PATH}"
          echo "APK_PATH=${APK_PATH}"
          echo "apk_path=${APK_PATH}" >> "${GITHUB_OUTPUT}"
          sha256sum "${APK_PATH}"

      - name: Upload verified release APK
        uses: actions/upload-artifact@v4
        with:
          name: smartdash-verify-release-${{ github.run_number }}
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Verify manifest fields
        shell: bash
        run: |
          VERSION_NAME="$(sed -nE 's/^[[:space:]]*versionName = "([^"]+)"/\1/p' app/build.gradle.kts | head -n 1)"
          VERSION_CODE="$(sed -nE 's/^[[:space:]]*versionCode = ([0-9]+)/\1/p' app/build.gradle.kts | head -n 1)"
          test -n "${VERSION_NAME}"
          test -n "${VERSION_CODE}"
          echo "versionName=${VERSION_NAME}"
          echo "versionCode=${VERSION_CODE}"
